# Example configuration for Panopticon.
#
# Copy this file to `panopticon.yaml` in the directory where you run `panopticon`.
#
# Top-level keys:
# - runtime
# - overseer
# - sentinel
# - watchtower

runtime:
  # `worktree` derives stable local ports from the checkout path so two local copies
  # can run concurrently without editing this file. Use `fixed` to keep the legacy
  # default ports unless a package explicitly overrides them.
  portStrategy: worktree

sentinel:
  # Enable the built-in demo simulator.
  # Accepts: true/false
  demoSim: false

overseer:
  # Directory where Overseer writes logs.
  # Default (if omitted): <cwd>/logs
  logDir: ./logs

  # Winston-style log levels.
  # Common values: error, warn, info, http, verbose, debug, silly
  logLevel: info
  consoleLogLevel: info
  fileLogLevel: debug

  # Sentinel base URL defaults to the resolved local Sentinel port.
  # Set either of these only if you want a non-local override.
  # sentinelUrl: http://127.0.0.1:19000
  # apiBaseUrl: http://127.0.0.1:19000

  # Log shipping tuning.
  sentinelLogTimeoutMs: 2000
  sentinelLogMaxQueue: 500

watchtower:
  # Host for the Watchtower static or dev server.
  host: 0.0.0.0

  # API base URL defaults to the resolved local Sentinel port.
  # apiBaseUrl: http://127.0.0.1:19000
