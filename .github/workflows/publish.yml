name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  # Build/test on Linux (fast feedback)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Test
        run: npm test

  publish:
  needs: [test]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Install
        run: npm ci

      - name: Build publishable packages
        run: |
          npm run build -w sentinel
          npm run build -w overseer
          npm run build -w watchtower
          npm run build -w panopticon-cli

      - name: Publish panopticon-cli
        run: npm publish -w panopticon-cli

      - name: Publish panopticon wrapper
        run: npm publish -w panopticon