name: Maintenance

on:
  workflow_dispatch:
  schedule:
    # Weekly drift detection (docs/invariants/test harness).
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: maintenance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Validate
        run: npm run check
